<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gratitude Pixies">
<meta name="theme-color" content="#07121e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Gratitude Pixies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
  html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
  body { font-family: 'Press Start 2P', monospace; background: #07121e; color: #b8e8f8; -webkit-font-smoothing: none; image-rendering: pixelated; }
  #app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-top: var(--safe-top); }
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 18px 120px; }
  .scroll::-webkit-scrollbar { display: none; }
  button { font-family: 'Press Start 2P', monospace; cursor: pointer; border: none; background: none; -webkit-tap-highlight-color: transparent; }
  input, textarea { font-family: 'Press Start 2P', monospace; outline: none; resize: none; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; }
  .tab-bar { display: flex; background: var(--bg); border-top: 2px solid var(--border); padding-bottom: var(--safe-bottom); flex-shrink: 0; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 8px; gap: 5px; background: none; border: none; cursor: pointer; position: relative; }
  .tab-btn.active::before { content: ''; position: absolute; top: 4px; left: 50%; transform: translateX(-50%); width: 44px; height: 36px; border-radius: 8px; background: var(--tab-hl); }
  .tab-label { font-size: 9px; color: var(--muted); position: relative; z-index: 1; }
  .tab-btn.active .tab-label { color: var(--primary); }
  .card { background: var(--card); border: 2px solid var(--border); padding: 14px; margin-bottom: 12px; }
  .card.bright { background: var(--card-bright); border-color: var(--border-bright); }
  .btn { width: 100%; padding: 14px; border: 2px solid var(--border-bright); background: var(--btn-bg); color: var(--text); font-size: 9px; text-align: center; letter-spacing: 1px; cursor: pointer; display: block; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.ghost { background: transparent; border-color: var(--border); color: var(--muted); }
  .btn.accent-bg { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .pixel-input { width: 100%; background: var(--card); border: 2px solid var(--border); padding: 12px; color: var(--text); font-size: 9px; line-height: 18px; }
  .pixel-input::placeholder { color: var(--dim); }
  .bubble { background: var(--card-bright); border: 2px solid var(--border-bright); padding: 10px 14px; display: inline-block; font-size: 9px; color: var(--text); line-height: 16px; max-width: 220px; position: relative; white-space: pre-line; }
  .bubble::after { content: ''; position: absolute; left: -10px; bottom: 10px; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-right: 10px solid var(--border-bright); }
  .pixel-bar { display: flex; gap: 3px; }
  .pixel-bar-seg { height: 8px; flex: 1; border: 1px solid; }
  h1 { font-size: 9px; color: var(--primary); margin-bottom: 20px; }
  .section-label { font-size: 9px; color: var(--accent); letter-spacing: 1px; margin-bottom: 14px; }
  .back-btn { font-size: 9px; color: var(--primary); padding: 6px; margin-bottom: 14px; display: inline-block; }
  .hidden { display: none !important; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes pop { 0% { transform: scale(0.5); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
  .bounce { animation: bounce 1s infinite; }
  .pop { animation: pop 0.4s cubic-bezier(.36,.07,.19,.97); }
  .row { display: flex; align-items: center; gap: 10px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .prompt-tile { background: var(--card); border: 2px solid var(--border); padding: 10px; font-size: 9px; color: var(--text); line-height: 14px; text-align: left; cursor: pointer; box-shadow: 2px 2px 0 var(--shadow); }
  .tab-toggle { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab-toggle-btn { flex: 1; padding: 10px; text-align: center; font-size: 9px; border: 2px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
  .tab-toggle-btn.active { background: var(--card-bright); border-color: var(--border-bright); color: var(--accent); }
  .progress-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 14px; }
  .progress-seg { flex: 1; height: 5px; }
  .entry-card { margin-bottom: 10px; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .inspire-btn { border: 2px solid var(--border-bright); padding: 6px 10px; font-size: 9px; color: var(--primary); }
  .shield-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .stat-row { display: flex; justify-content: space-between; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
  .pixie-row { margin-bottom: 12px; padding: 12px; background: var(--card); border: 1px solid var(--border); }
  .char-item { display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 8px; border: 2px solid; cursor: pointer; }
  .delete-btn { font-size: 18px; padding: 6px; cursor: pointer; }
  #toast { position: fixed; top: calc(var(--safe-top) + 60px); left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 10px 18px; font-size: 9px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; border: 2px solid var(--border-bright); white-space: nowrap; }
  #toast.show { opacity: 1; }
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  .confirm-box { background: var(--card-bright); border: 2px solid var(--border-bright); padding: 20px; max-width: 300px; width: 100%; }
  .confirm-msg { font-size: 9px; color: var(--text); line-height: 16px; margin-bottom: 18px; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-btns button { flex: 1; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="confirm-overlay" class="confirm-overlay hidden">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="btn ghost" id="confirm-cancel">CANCEL</button>
      <button class="btn" id="confirm-ok" style="color:#ff6060">DELETE</button>

  </div>
</div>

// ─── STATE ──────────────────────────────────────────────────
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('gp_state') || '{}');
    const today = new Date().toDateString();
    let {theme='water', entries=[], reviews=[], streak=0, shields=0, lastEntryDate=today, userName=''} = s;
    // Shield burn logic
    const days = Math.floor((Date.now() - new Date(lastEntryDate)) / 86400000);
    if (days >= 2) {
      const missed = days - 1;
      const burned = Math.min(shields, missed);
      const unprotected = missed - burned;
      shields = Math.max(0, shields - burned);
      if (unprotected > 0) streak = Math.max(0, streak - unprotected);
      const d = new Date(lastEntryDate);
      d.setDate(d.getDate() + burned);
      lastEntryDate = d.toDateString();
    }
    return {theme, entries, reviews, streak, shields, lastEntryDate, userName};
  } catch(e) { return {theme:'water',entries:[],reviews:[],streak:0,shields:0,lastEntryDate:new Date().toDateString(),userName:''}; }
}

let STATE = loadState();

function saveState() {
  localStorage.setItem('gp_state', JSON.stringify(STATE));
}

function saveEntry(entry) {
  STATE.entries.unshift(entry);
  const today = new Date().toDateString();
  if (STATE.lastEntryDate !== today) {
    STATE.streak++;
    if (STATE.streak % 7 === 0) STATE.shields++;
    STATE.lastEntryDate = today;
  }
  saveState();
}

function deleteEntry(id) { STATE.entries = STATE.entries.filter(e => e.id !== id); saveState(); }
function deleteReview(id) { STATE.reviews = STATE.reviews.filter(r => r.id !== id); saveState(); }
function saveReview(text, entries, count) {
  const date = new Date().toLocaleDateString('en-US',{month:'short',day:'2-digit'}).toUpperCase().replace(' ','-');
  const wl = entries.length > 0 ? `${entries[entries.length-1].date} – ${entries[0].date}` : 'recent entries';
  STATE.reviews.unshift({id:Date.now(), date, weekLabel:wl, entryCount:count, text});
  saveState();
}

function getTheme() { return THEMES[STATE.theme] || THEMES.water; }
function daysSince() { return Math.floor((Date.now() - new Date(STATE.lastEntryDate)) / 86400000); }
function pixieMood() { const d=daysSince(); return d===0?'happy':d===1?'idle':d===2?'think':'sleep'; }
function formatDate() { return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase(); }
function entryDate() { return new Date().toLocaleDateString('en-US',{month:'short',day:'2-digit'}).toUpperCase().replace(' ','-'); }
function randFrom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function getLvlTitle(id, l) { return (LEVEL_TITLES[id]||LEVEL_TITLES.water)[Math.min(l,9)]; }

// ─── SPRITE RENDERER ────────────────────────────────────────
function drawSprite(canvasId, themeId, face, pw) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const grid = SPRITES[themeId]?.[face] || SPRITES.water.idle;
  const pal = PAL[themeId] || PAL.water;
  const rows = grid.length, cols = grid[0].length;
  canvas.width = cols * pw; canvas.height = rows * pw;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  grid.forEach((row, y) => row.forEach((c, x) => {
    if (c && pal[c]) { ctx.fillStyle = pal[c]; ctx.fillRect(x*pw, y*pw, pw, pw); }
  }));
}

// ─── TOAST ──────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── CONFIRM ────────────────────────────────────────────────
function confirm(msg, onOk) {
  const overlay = document.getElementById('confirm-overlay');
  document.getElementById('confirm-msg').textContent = msg;
  overlay.classList.remove('hidden');
  document.getElementById('confirm-ok').onclick = () => { overlay.classList.add('hidden'); onOk(); };
  document.getElementById('confirm-cancel').onclick = () => overlay.classList.add('hidden');
}

// ─── THEME VARS ─────────────────────────────────────────────
function applyTheme(t) {
  const r = document.documentElement.style;
  r.setProperty('--bg', t.bg);
  r.setProperty('--card', t.card);
  r.setProperty('--card-bright', t.cardBright);
  r.setProperty('--border', t.border);
  r.setProperty('--border-bright', t.borderBright);
  r.setProperty('--primary', t.primary);
  r.setProperty('--accent', t.accent);
  r.setProperty('--text', t.text);
  r.setProperty('--muted', t.muted);
  r.setProperty('--dim', t.dim);
  r.setProperty('--btn-bg', t.btnBg);
  r.setProperty('--shadow', t.shadow);
  r.setProperty('--tab-hl', t.primary + '22');
  document.body.style.background = t.bg;
  document.querySelector('meta[name="theme-color"]').content = t.bg;
}

// ─── NAVIGATION ─────────────────────────────────────────────
let currentScreen = 'home';
let screenStack = [];
let guidedState = {};

function navigate(screen, params={}, pushToStack=true) {
  if (pushToStack && currentScreen !== screen) screenStack.push(currentScreen);
  currentScreen = screen;
  applyTheme(getTheme());
  render(screen, params);
  window.scrollTo(0,0);
}

function goBack() {
  if (screenStack.length) navigate(screenStack.pop(), {}, false);
  else navigate('home', {}, false);
}

async function generateReview() {
  const avail = STATE.entries.slice(0, reviewCount);
  if (!avail.length) return;
  reviewLoading = true; reviewText = null; reviewSaved = false;
  render('diary');
  const summary = avail.map((e,i)=>{
    const things = [...(e.answers||[]),...(e.freeWrite?[e.freeWrite]:[])].filter(a=>a?.trim());
    return `Entry ${i+1} (${e.date}): ${things.join(', ')}`;
  }).join('\n');
  try {
    const BACKEND = window.BACKEND_URL || 'https://gratitude-pixies-backend-production.up.railway.app';
    const res = await fetch(`${BACKEND}/api/review`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-opus-4-5', max_tokens:1000,
        system:`You are a warm, cute pixel companion called a Gratitude Pixie. You speak in short, gentle, encouraging sentences. You've just read someone's gratitude journal entries and you're writing them a heartfelt review — like a little letter from you to them. Write 3-4 short paragraphs. Notice patterns, celebrate small wins, highlight recurring themes of gratitude. Be warm and personal, not generic. Use occasional light emoji. Keep it under 180 words total. Do NOT use headers or bullet points — just flowing warm prose. Start with something like "what a lovely stretch of days..." or similar cosy opener.`,
        messages:[{role:'user',content:`Here are my last ${reviewCount} gratitude journal entries:\n\n${summary}\n\nPlease write my review!`}]
      })
    });
    const data = await res.json();
    reviewText = data.content?.find(b=>b.type==='text')?.text || "something went wrong~ try again!";
  } catch { reviewText = "couldn't connect right now~ try again later! ♥"; }
  reviewLoading = false;
  render('diary');
}

function handleSaveReview() {
  saveReview(reviewText, STATE.entries.slice(0, reviewCount), reviewCount);
  reviewText = null;
  reviewSaved = false;
  render('diary');
  toast('review saved! ✦');
}

// ─── MAIN RENDER ────────────────────────────────────────────
function render(screen, params={}) {
  const app = document.getElementById('app');
  let html = '';
  if (screen==='home') html = renderHome();
  else if (screen==='guided') html = renderGuided();
  else if (screen==='optional') html = renderOptional();
  else if (screen==='freewrite') html = renderFreeWrite();
  else if (screen==='done') html = renderDone();
  else if (screen==='diary') html = renderDiary();
  else if (screen==='stats') html = renderStats();
  else if (screen==='config') html = renderConfig();
  else html = renderHome();
  app.innerHTML = html + `<div id="toast"></div><div id="confirm-overlay" class="confirm-overlay hidden"><div class="confirm-box"><div class="confirm-msg" id="confirm-msg"></div><div class="confirm-btns"><button class="btn ghost" id="confirm-cancel">CANCEL</button><button class="btn" id="confirm-ok" style="color:#ff6060">DELETE</button></div></div></div>`;
  // Draw all sprites after render
  requestAnimationFrame(() => {
    document.querySelectorAll('canvas[data-sprite]').forEach(c => {
      drawSprite(c.id, c.dataset.theme, c.dataset.face, parseInt(c.dataset.pw));
    });
  });
}

// ─── SHARE ───────────────────────────────────────────────────
function doShare(text) {
  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(text).then(() => toast('copied to clipboard! ✦'));
  }
}

function shareStreak() {
  const name = STATE.userName ? STATE.userName + "'s" : 'My';
  const text = name + ' Gratitude Pixies streak: 🔥 ' + STATE.streak + ' days!\n\nTracking daily gratitude with my pixel companion~ ✨\nhttps://gratitude-pixies-pwa.vercel.app';
  doShare(text);
}

function shareEntry(entry) {
  if (!entry) return;
  const answers = [...(entry.answers || []), ...(entry.freeWrite ? [entry.freeWrite] : [])].filter(a => a?.trim());
  if (!answers.length) return;
  const name = STATE.userName ? STATE.userName + "'s" : 'My';
  const text = '✦ ' + name + ' gratitude for ' + entry.date + ' ✦\n\n' +
    answers.map((a, i) => (i + 1) + '. ' + a).join('\n') +
    '\n\n🔥 Day ' + STATE.streak + ' streak · Gratitude Pixies\nhttps://gratitude-pixies-pwa.vercel.app';
  doShare(text);
}

function shareReview(id) {
  const sr = STATE.reviews.find(r => r.id === id);
  if (!sr) return;
  const name = STATE.userName ? STATE.userName + "'s" : 'My';
  const text = '✦ ' + name + ' week in review (' + sr.weekLabel + ') ✦\n\n' + sr.text + '\n\n— Gratitude Pixies ✨\nhttps://gratitude-pixies-pwa.vercel.app';
  doShare(text);
}

// ─── LONG PRESS ─────────────────────────────────────────────
let _lpTimer = null;
let _lpMoved = false;
function lpStart(e, cb) {
  _lpMoved = false;
  _lpTimer = setTimeout(() => {
    if (!_lpMoved) { e.preventDefault(); cb(); }
  }, 500);
}
function lpEnd() {
  clearTimeout(_lpTimer);
}

// ─── INIT ───────────────────────────────────────────────────
applyTheme(getTheme());
render('home');

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// Handle android back button
window.addEventListener('popstate', () => goBack());
</script>
